plugins:
  - name: example_plugin
    enabled: false
    weight: 1.0
    config: {}

  - name: time_to_completion
    enabled: true
    weight: 1.0
    config:
      # Fallback thresholds when story points are unavailable.
      ideal_hours: 4.0
      max_hours: 24.0

      # When true, ideal/max hours are looked up from story_points_thresholds
      # using the ticket's story point value instead of the flat values above.
      scale_by_story_points: true

      # Jira Cloud default story points field. Override if your instance differs.
      story_points_field: customfield_10023

      # Statuses whose duration is excluded from active time.
      # Time spent in these states does not count against the score.
      excluded_statuses:
        - In Review
        - Blocked

      # Per-SP thresholds derived from the Fibonacci story point cheat sheet:
      #   1 SP  — less than 2 hours
      #   2 SP  — half a day
      #   3 SP  — up to two days
      #   5 SP  — few days
      #   8 SP  — around a week  (should be split into smaller items)
      #  13 SP  — more than a week (must be split into smaller items)
      story_points_thresholds:
        1:  { ideal_hours: 1,  max_hours: 2  }
        2:  { ideal_hours: 4,  max_hours: 8  }
        3:  { ideal_hours: 8,  max_hours: 16 }
        5:  { ideal_hours: 16, max_hours: 32 }
        8:  { ideal_hours: 32, max_hours: 40 }
        13: { ideal_hours: 40, max_hours: 80 }
